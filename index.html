<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烏野高中題目大作戰！</title>
    <style>
        :root {
            --karasuno-orange: #ff6b00;
            --karasuno-black: #1a1a1a;
            --karasuno-gray: #333333;
            --bg-color: #f4f4f4;
            --white-panel: rgba(255, 255, 255, 0.96);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;

            /* 劇場版背景大圖 */
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                        url('https://img.myvideo.net.tw/images/MED010/0000/1163/202007091743570347_2016.jpg');
            background-size: cover;
            background-position: 45% center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--white-panel);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            box-sizing: border-box;
            border: 3.5px solid var(--karasuno-orange);
            z-index: 10;
            margin: 20px auto;
        }
        
        .title-area {
            text-align: center;
            margin-bottom: 15px;
        }
        h2 { 
            color: var(--karasuno-black); 
            margin: 0; 
            font-size: 22px;
            letter-spacing: 1.5px;
            text-shadow: 1px 1px 0px var(--karasuno-orange);
        }
        .sub-title {
            font-size: 11px;
            color: #666;
            font-weight: bold;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .page { display: none; }
        .page.active {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 總能量條區塊 */
        .energy-section {
            background: var(--karasuno-gray);
            color: white;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            border-left: 5px solid var(--karasuno-orange);
            font-size: 14px;
        }
        .energy-section strong {
            color: var(--karasuno-orange);
            font-size: 18px;
        }
        .progress-bar-container {
            background-color: #444;
            border-radius: 20px;
            height: 28px; 
            width: 100%;
            margin: 10px 0;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.3);
            border: 1px solid #555;
            position: relative; 
        }
        .progress-bar {
            background: linear-gradient(90deg, #ff3300, var(--karasuno-orange), #ffcc00);
            height: 100%;
            width: 0%; 
            border-radius: 20px;
            transition: width 1.5s cubic-bezier(0.1, 1.0, 0.1, 1.0);
        }
        
        .volleyball-icon {
            position: absolute;
            top: -8px;          
            left: 0%;           
            width: 42px;
            height: 42px;
            margin-left: -21px; 
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.6);
            pointer-events: none;
            transition: left 1.5s cubic-bezier(0.1, 1.0, 0.1, 1.0); 
            animation: ballSpin 2s linear infinite; 
            box-sizing: border-box;
            border: 1.5px solid var(--karasuno-orange);
            background-color: #000;
            overflow: hidden; 
        }

        .volleyball-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }
        
        @keyframes ballSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 每週統計區塊樣式 */
        .weekly-stats-section {
            background-color: #eee;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }
        .weekly-stats-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--karasuno-black);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .weekly-grid {
            display: flex;
            gap: 10px;
        }
        .stat-card {
            flex: 1;
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1.5px solid #ddd;
        }
        .stat-card.current {
            border-color: var(--karasuno-orange);
            background-color: #fff8f3;
        }
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--karasuno-black);
        }
        .stat-value span { font-size: 12px; font-weight: normal; color: #666; }
        .stat-card.current .stat-value { color: var(--karasuno-orange); }

        .quote-box {
            margin-top: 10px;
            font-size: 11px;
            font-style: italic;
            color: #555;
            text-align: center;
            line-height: 1.4;
            padding: 0 5px;
        }

        /* 表單與紀錄樣式微調 */
        .form-group { margin-bottom: 14px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: var(--karasuno-black);
            font-size: 14px;
        }
        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            border-color: var(--karasuno-orange);
            outline: none;
        }
        
        .duration-picker {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .duration-picker select { flex: 1; text-align: center; padding: 10px 5px; }
        .duration-picker span { font-weight: bold; color: var(--karasuno-gray); white-space: nowrap; font-size: 14px; }

        button.btn {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
        }
        button.submit-btn {
            background-color: var(--karasuno-orange);
            box-shadow: 0 4px 0px #c45200;
            margin-top: 5px;
        }
        button.submit-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #c45200;
        }
        button.back-btn {
            background-color: var(--karasuno-black);
            border: 2px solid var(--karasuno-orange);
            margin-top: 15px;
            padding: 10px;
            font-size: 14px;
        }

        .record-list {
            margin-top: 20px;
            border-top: 2px solid var(--karasuno-black);
            padding-top: 12px;
        }
        .record-list h3 { font-size: 16px; margin-top: 0; margin-bottom: 10px; }
        .record-item {
            font-size: 13px;
            color: #444;
            padding: 8px;
            border-bottom: 1px dashed #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fdfdfd;
            margin-bottom: 4px;
            border-radius: 5px;
        }
        .delete-btn {
            background-color: var(--karasuno-black);
            color: white;
            border: 1px solid var(--karasuno-orange);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 10px;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 20px;
        }

        /* 萬用客製化 DOM 彈窗樣式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: #fff; width: 85%; max-width: 340px;
            border-radius: 12px; border: 3px solid var(--karasuno-orange);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden; animation: modalPop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-header {
            background: var(--karasuno-black); color: #fff;
            padding: 12px; font-weight: bold; font-size: 15px;
            text-align: center; border-bottom: 2px solid var(--karasuno-orange);
            letter-spacing: 1px;
        }
        .modal-body { padding: 20px; font-size: 14px; color: #333; line-height: 1.5; text-align: center; }
        .modal-input {
            width: 100%; padding: 8px; margin-top: 10px;
            border: 2px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        .modal-input:focus { border-color: var(--karasuno-orange); outline: none; }
        .modal-footer {
            padding: 10px 15px 15px; display: flex; gap: 10px; justify-content: center;
        }
        .modal-btn {
            flex: 1; padding: 10px; border: none; border-radius: 6px;
            font-size: 14px; font-weight: bold; cursor: pointer; text-align: center;
        }
        .modal-btn-confirm { background: var(--karasuno-orange); color: white; }
        .modal-btn-cancel { background: #eee; color: #555; }
        
        /* 視覺鎖定與半透明類別 */
        .btn-locked {
            pointer-events: none !important;
            opacity: 0.4 !important;
            box-shadow: none !important;
            transform: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-area">
        <h2>飛吧！題目挑戰能量條</h2>
        <div class="sub-title">— 將汗水與題目化為不落的烏鴉之翼 —</div>
    </div>
    
    <div id="page-input" class="page active">
        <form id="唱題表單">
            <div class="form-group">
                <label for="name">隊員姓名</label>
                <input type="text" id="name" placeholder="例如：日向翔陽" required>
            </div>

            <div class="form-group">
                <label for="date">挑戰日期</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label>唱題時數（滾動選填）</label>
                <div class="duration-picker">
                    <select id="hours-select"></select>
                    <span>小時</span>
                    <select id="minutes-select"></select>
                    <span>分鐘</span>
                </div>
            </div>

            <button type="submit" class="btn submit-btn">🔥 扣球！注入唱題能量！</button>
        </form>
    </div>

    <div id="page-result" class="page">
        <div class="energy-section">
            <div>目前累積生命力：<strong id="current-hours">0</strong> / <span id="target-hours">100</span> 小時</div>
            
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
                <div id="volleyball" class="volleyball-icon">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT3XXXHrmwzsKjlKneNUUIQMFcWy2uedU8L427CkyoeGMQk025IQLgq5kk8&s=10" alt="烏野排球">
                </div>
            </div>
            
            <div>跟著烏野一起突破極限吧！</div>
        </div>

        <div class="weekly-stats-section">
            <div class="weekly-stats-title">📊 每週唱題速報</div>
            <div class="weekly-grid">
                <div class="stat-card current">
                    <div class="stat-label">本週累積 (Mon-Sun)</div>
                    <div class="stat-value" id="this-week-hours">0.0<span> 小時</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">上週累積</div>
                    <div class="stat-value" id="last-week-hours">0.0<span> 小時</span></div>
                </div>
            </div>
            <div class="quote-box" id="quote-box">「不准低頭！排球是永遠向上的運動！」—— 下養繫心</div>
        </div>

        <div class="record-list">
            <h3>✨ 隊員挑戰速報</h3>
            <div id="records">暫無紀錄</div>
        </div>

        <button id="go-back-btn" class="btn back-btn">⬅️ 返回填寫下一筆</button>
        
        <center><button class="clear-btn" id="clear-data-btn">⚙️ 烏野教練/領隊專用重設</button></center>
    </div>
</div>

<div id="custom-modal" class="modal-overlay">
    <div class="modal-box">
        <div id="modal-title" class="modal-header">烏野高中排球部通告</div>
        <div class="modal-body">
            <div id="modal-text">提示訊息</div>
            <input type="text" id="modal-input-field" class="modal-input" style="display: none;">
        </div>
        <div class="modal-footer" id="modal-buttons">
            </div>
    </div>
</div>

<script>
    const TARGET_HOURS = 90; 
    const ADMIN_PASSWORD = "1234"; 
    const STORAGE_KEY = "karasuno_my_records"; 

    // 🔗 您的最新 Google Apps Script Web App 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbxShOiSE8581x7pUN7gyibZbe1xvMXUe0NtCI5VWcSDfd-NhXg2N1RDJqpQbmCzPNXJ/exec";

    // 📋 試算表欄位順序：id, name, date, hours, minutes, value
    const COLUMNS = ["id", "name", "date", "hours", "minutes", "value"];

    // 排球少年勵志語錄
    const quotes = [
        "「不准低頭！排球是永遠向上的運動！」—— 下養繫心",
        "「正是因為沒有羽翼，人類才會尋找飛翔的方法。」—— 武田一鐵",
        "「如果認為自己沒有才能，那大概一輩子都不會有了。」—— 及川徹",
        "「身為接應，如果不夠高，那就用跳躍來補足！」—— 日向翔陽",
        "「所謂排球，是在網子這一邊的全員，都是夥伴啊！」—— 田中龍之介",
        "「昨天已經輸了，今天不一定會輸，明天更是一切未知。」—— 澤村大地"
    ];

    document.getElementById('target-hours').innerText = TARGET_HOURS;

    const hoursSelect = document.getElementById('hours-select');
    const minutesSelect = document.getElementById('minutes-select');
    for (let i = 0; i <= 23; i++) hoursSelect.options[hoursSelect.options.length] = new Option(i, i);
    for (let i = 0; i <= 59; i++) minutesSelect.options[minutesSelect.options.length] = new Option(i, i);
    hoursSelect.value = 1;
    minutesSelect.value = 0;

    document.getElementById('date').value = new Date().toISOString().substring(0, 10);

    let currentTotalHours = 0;
    let savedRecords = [];

    /* ============================================================
       Promise 架構的客製化 DOM 彈窗系統
       ============================================================ */
    function showModal({ title = "烏野高中排球部", message = "", type = "alert", placeholder = "" }) {
        return new Promise((resolve) => {
            const overlay = document.getElementById('custom-modal');
            const titleEl = document.getElementById('modal-title');
            const textEl = document.getElementById('modal-text');
            const inputField = document.getElementById('modal-input-field');
            const footer = document.getElementById('modal-buttons');

            titleEl.innerText = title;
            textEl.innerText = message;
            inputField.value = "";
            
            if (type === "prompt") {
                inputField.style.display = "block";
                inputField.placeholder = placeholder;
            } else {
                inputField.style.display = "none";
            }

            footer.innerHTML = "";

            if (type === "alert") {
                const btn = document.createElement('button');
                btn.className = "modal-btn modal-btn-confirm";
                btn.innerText = "確認";
                btn.onclick = () => { overlay.classList.remove('active'); resolve(true); };
                footer.appendChild(btn);
            } else if (type === "confirm") {
                const btnCancel = document.createElement('button');
                btnCancel.className = "modal-btn modal-btn-cancel";
                btnCancel.innerText = "取消";
                btnCancel.onclick = () => { overlay.classList.remove('active'); resolve(false); };
                
                const btnConfirm = document.createElement('button');
                btnConfirm.className = "modal-btn modal-btn-confirm";
                btnConfirm.innerText = "確認";
                btnConfirm.onclick = () => { overlay.classList.remove('active'); resolve(true); };
                
                footer.appendChild(btnCancel);
                footer.appendChild(btnConfirm);
            } else if (type === "prompt") {
                const btnCancel = document.createElement('button');
                btnCancel.className = "modal-btn modal-btn-cancel";
                btnCancel.innerText = "取消";
                btnCancel.onclick = () => { overlay.classList.remove('active'); resolve(null); };
                
                const btnConfirm = document.createElement('button');
                btnConfirm.className = "modal-btn modal-btn-confirm";
                btnConfirm.innerText = "確認";
                btnConfirm.onclick = () => { overlay.classList.remove('active'); resolve(inputField.value); };
                
                footer.appendChild(btnCancel);
                footer.appendChild(btnConfirm);
            }

            overlay.classList.add('active');
        });
    }

    function getLocalRecordsMap() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : {};
        } catch (e) {
            return {};
        }
    }

    function saveRecordIdToLocal(id) {
        const map = getLocalRecordsMap();
        map[String(id)] = true;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(map));
    }

    // 將後端的二維陣列轉成物件陣列（跳過標題列）
    function rowsToRecords(rows) {
        if (!Array.isArray(rows) || rows.length <= 1) return [];
        const body = rows.slice(1); 
        return body.map(row => {
            const obj = {};
            COLUMNS.forEach((key, idx) => { obj[key] = row[idx]; });
            
            obj.id = obj.id != null ? String(obj.id).trim() : "";
            obj.hours = Number(obj.hours) || 0;
            obj.minutes = Number(obj.minutes) || 0;
            obj.value = Number(obj.value) || (obj.hours + obj.minutes / 60);
            obj.date = obj.date ? String(obj.date).substring(0, 10) : "";
            obj.name = obj.name != null ? String(obj.name) : "";
            return obj;
        }).filter(r => r.id); 
    }

    // 讀取（GET）所有紀錄
    async function fetchRecords() {
        const res = await fetch(API_URL, { method: "GET" });
        const rows = await res.json();
        savedRecords = rowsToRecords(rows);
        savedRecords.sort((a, b) => b.id.localeCompare(a.id));
        currentTotalHours = savedRecords.reduce((sum, r) => sum + r.value, 0);
    }

    // 共用的 POST 送出
    async function postJson(body) {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(body)
        });
        return res.json().catch(() => ({}));
    }

    // 新增（POST）
    async function postRow(record) {
        const rowArray = COLUMNS.map(key => record[key]);
        return postJson(rowArray);
    }

    // 動作指令（POST）
    async function postAction(actionObj) {
        return postJson(actionObj);
    }

    /* ============================================================
       每週統計
       ============================================================ */
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return [d.getUTCFullYear(), weekNo];
    }

    function updateWeeklyStats() {
        const now = new Date();
        const currentYearWeek = getWeekNumber(now);

        const lastWeekDate = new Date();
        lastWeekDate.setDate(now.getDate() - 7);
        const lastYearWeek = getWeekNumber(lastWeekDate);

        let thisWeekTotal = 0;
        let lastWeekTotal = 0;

        savedRecords.forEach(record => {
            const recordDate = new Date(record.date);
            const recordYearWeek = getWeekNumber(recordDate);

            if (recordYearWeek[0] === currentYearWeek[0] && recordYearWeek[1] === currentYearWeek[1]) {
                thisWeekTotal += record.value;
            } else if (recordYearWeek[0] === lastYearWeek[0] && recordYearWeek[1] === lastYearWeek[1]) {
                lastWeekTotal += record.value;
            }
        });

        document.getElementById('this-week-hours').innerHTML = `${thisWeekTotal.toFixed(1)}<span> 小時</span>`;
        document.getElementById('last-week-hours').innerHTML = `${lastWeekTotal.toFixed(1)}<span> 小時</span>`;

        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('quote-box').innerText = randomQuote;
    }

    /* ============================================================
       畫面渲染
       ============================================================ */
    function updateProgressBar() {
        document.getElementById('current-hours').innerText = currentTotalHours.toFixed(1);
        let percentage = (currentTotalHours / TARGET_HOURS) * 100;
        if (percentage > 100) percentage = 100;

        document.getElementById('progress-bar').style.width = percentage + '%';
        document.getElementById('volleyball').style.left = percentage + '%';
    }

    function renderRecords() {
        const recordsContainer = document.getElementById('records');
        if (savedRecords.length === 0) {
            recordsContainer.innerText = '暫無紀錄';
            return;
        }
        recordsContainer.innerHTML = '';
        savedRecords.forEach(record => {
            const newRecord = document.createElement('div');
            newRecord.className = 'record-item';
            newRecord.innerHTML = `<span>🧡 <strong>${record.name}</strong> 於 ${record.date} 挑戰 <strong>${record.hours}時${record.minutes}分</strong></span>`;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerText = '❌ 刪除';
            deleteBtn.onclick = function() { deleteRecord(deleteBtn, record.id, record.name, record.value); };

            newRecord.appendChild(deleteBtn);
            recordsContainer.appendChild(newRecord);
        });
    }

    function refreshUI(animate) {
        renderRecords();
        updateWeeklyStats();
        if (animate) {
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('volleyball').style.left = '0%';
            document.getElementById('current-hours').innerText = '0.0';
            setTimeout(updateProgressBar, 150);
        } else {
            updateProgressBar();
        }
    }

    function setAllResultButtonsLocked(isLocked) {
        const deleteButtons = document.querySelectorAll('.delete-btn');
        const goBackBtn = document.getElementById('go-back-btn');
        const clearBtn = document.getElementById('clear-data-btn');

        deleteButtons.forEach(btn => {
            if (isLocked) btn.classList.add('btn-locked');
            else btn.classList.remove('btn-locked');
        });

        if (isLocked) {
            goBackBtn.classList.add('btn-locked');
            clearBtn.classList.add('btn-locked');
        } else {
            goBackBtn.classList.remove('btn-locked');
            clearBtn.classList.remove('btn-locked');
        }
    }

    /* ============================================================
       事件處理
       ============================================================ */
    const submitBtn = document.querySelector('#唱題表單 .submit-btn');

    document.getElementById('唱題表單').addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = document.getElementById('name').value.trim();
        const date = document.getElementById('date').value;
        const hours = parseInt(hoursSelect.value);
        const minutes = parseInt(minutesSelect.value);

        if (!name) return showModal({ message: '請輸入姓名！' });
        if (hours === 0 && minutes === 0) return showModal({ message: '請選擇唱題時間！' });

        const addedHours = hours + (minutes / 60);
        const generatedId = String(Date.now()); 
        
        const recordObj = {
            id: generatedId, 
            name: name, 
            date: date,
            hours: hours, 
            minutes: minutes, 
            value: addedHours
        };

        const originalText = submitBtn.innerText;
        submitBtn.classList.add('btn-locked');
        submitBtn.innerText = '送出中請等待數秒...';

        try {
            await postRow(recordObj);   
            saveRecordIdToLocal(generatedId);
            await fetchRecords();       

            document.getElementById('page-input').classList.remove('active');
            document.getElementById('page-result').classList.add('active');

            refreshUI(true); 
        } catch (err) {
            console.error(err);
            showModal({ message: '資料傳送失敗，請檢查網路或稍後再試。' });
        } finally {
            submitBtn.classList.remove('btn-locked');
            submitBtn.innerText = originalText;
        }
    });

    async function deleteRecord(clickedBtn, id, originalName, value) {
        // localStorage 安全性防禦比對
        const myRecordsMap = getLocalRecordsMap();
        if (!myRecordsMap[String(id)]) {
            await showModal({
                title: "武田老師提醒",
                message: "無法刪除！這筆挑戰紀錄不是您填寫的喔！"
            });
            return; 
        }

        const inputName = await showModal({
            title: "確認身分",
            message: `請輸入填寫本條紀錄的隊員姓名 (${originalName}) ：`,
            type: "prompt",
            placeholder: "填寫者姓名"
        });
        
        if (inputName === null) return; 
        if (inputName.trim() !== originalName) {
            showModal({ message: `名字不符！無法修改。` });
            return;
        }
        
        const isConfirm = await showModal({
            title: "下養教練警告",
            message: "確定要刪除這筆唱題紀錄嗎？",
            type: "confirm"
        });
        if (!isConfirm) return;

        // 鎖定結果頁的所有操作按鈕
        setAllResultButtonsLocked(true);
        const originalBtnText = clickedBtn.innerText;
        clickedBtn.innerText = "⏳...";

        try {
            const res = await postAction({ action: "delete", id: String(id) });
            
            if (res.status === "error") {
                showModal({ message: '刪除失敗：' + res.message });
                return;
            }

            await fetchRecords();
            refreshUI(false);
            showModal({ message: '紀錄已成功扣除！' });
        } catch (err) {
            console.error(err);
            showModal({ message: '刪除失敗，請稍後再試。' });
        } finally {
            setAllResultButtonsLocked(false);
            clickedBtn.innerText = originalBtnText;
        }
    }

    document.getElementById('go-back-btn').addEventListener('click', function() {
        hoursSelect.value = 1;
        minutesSelect.value = 0;
        document.getElementById('page-result').classList.remove('active');
        document.getElementById('page-input').classList.add('active');
    });

    document.getElementById('clear-data-btn').addEventListener('click', async function() {
        const password = await showModal({
            title: "教練專用重設",
            message: "請輸入教練/領隊管理密碼以清空全部資料：",
            type: "prompt",
            placeholder: "請輸入密碼"
        });
        
        if (password === null) return;
        if (password !== ADMIN_PASSWORD) { showModal({ message: '密碼錯誤！無法操作。' }); return; }
        
        const isConfirm = await showModal({
            title: "高能警告",
            message: "確定要讓所有人的汗水歸零嗎？此動作無法復原！",
            type: "confirm"
        });
        if (!isConfirm) return;

        setAllResultButtonsLocked(true);

        try {
            await postAction({ action: "clear" });
            await fetchRecords();
            refreshUI(false);
            showModal({ message: '排球場已清空！' });
        } catch (err) {
            console.error(err);
            showModal({ message: '清空失敗，請稍後再試。' });
        } finally {
            setAllResultButtonsLocked(false);
        }
    });

    /* ============================================================
       初始化
       ============================================================ */
    (async function init() {
        try {
            await fetchRecords();
        } catch (err) {
            console.error('初始讀取失敗：', err);
        }
        renderRecords();
        updateWeeklyStats();
    })();
</script>

</body>
</html>
